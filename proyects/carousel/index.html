<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
    />
    <title>Document</title>
  </head>
  <body>
    <main>
      <section class="container">
        <div class="title">
          <h2>Our Reviews</h2>
          <div class="underline"></div>
        </div>
        <!-- review -->
        <article class="review">
          <div class="img-container">
            <img src="person-1.jpeg" id="person-img" alt="person image" />
          </div>
          <h4 class="author" id="author">Susan Smith</h4>
          <p id="job">UX DESIGNER</p>
          <p class="info" id="info">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Tempore
            sunt delectus quisquam magnam a, accusantium veniam molestiae?
            Minima, dolor, quisquam iste natus libero nesciunt ab sint, hic
            ipsum eos officia!
          </p>
          <!-- prev next buttons-->
          <div class="button-container">
            <button class="prev-btn" id="prev-btn">
              <i class="fas fa-chevron-left"></i>
            </button>
            <button class="next-btn" id="next-btn">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
          <!-- random button -->
          <button class="random-btn" id="rand-btn">surprise me</button>
        </article>
      </section>
    </main>
  </body>
  <script src="script.js"></script>
</html>
