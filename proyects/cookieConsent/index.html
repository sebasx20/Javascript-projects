<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Cookies consent</title>
  </head>
  <body>
    <div class="container" id="cookie-popup">
      <div class="content-icons">
        <div class="img">
          <img src="cookie-svgrepo.svg" alt="Cooke-icon" class="img-cookie" />
        </div>
        <div class="img close-icon">
          <img src="close-svgrepo.svg" alt="close-icon" />
        </div>
      </div>
      <div class="content-body">
        <p>We use cookies to improve your user experience.</p>
        <div class="button-container">
          <button type="button" class="button" id="btn">I like Cookies</button>
        </div>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
