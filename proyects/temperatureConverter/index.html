<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Temperature Converter</title>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2>Temperature Converter</h2>
        <sub>Enter the temperature, select units and submit</sub>
      </div>
      <div class="converter-container">
        <input type="number" id="number" placeholder="0.00" />
        <select
          name="temperatures"
          class="temperatures"
          id="from-unit"
          placeholder="From Unit"
          required
        >
          <option hidden>From Unit</option>
          <option value="Fahrenheit">Fahrenheit</option>
          <option value="Celseus">Celseus</option>
          <option value="Kelvin">Kelvin</option>
        </select>
        <select
          name="to-unit"
          class="temperatures"
          id="to-unit"
          placeholder="From Unit"
          required
        >
          <option hidden>To Unit</option>
          <option value="Fahrenheit">Fahrenheit</option>
          <option value="Celseus">Celseus</option>
          <option value="Kelvin">Kelvin</option>
        </select>
        <input type="button" value="Convert" id="btn-convert" />
      </div>
      <p id="result-convert"></p>
    </div>
  </body>
  <script src="script.js"></script>
</html>
